<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暗房 Darkroom · 上傳與拍照介面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sprocket-rail" aria-hidden="true"></div>

<header class="hero">
  <div class="hero-frame" aria-hidden="true">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>
    <span class="hero-meta">F/2.8 · ISO 400 · 1/125s</span>
  </div>
  <p class="eyebrow">/// 底片編號 0001</p>
  <h1>暗房<span class="hero-sub">Darkroom</span></h1>
  <p class="hero-desc">把照片拖進來,或直接開鏡頭拍一張。每一張都會在下面沖洗出來。</p>
</header>

<main>

  <section class="intake" aria-label="上傳照片">
    <div class="intake-grid">

      <div id="dropzone" class="dropzone" tabindex="0" role="button" aria-label="拖曳照片到此處,或按下選取檔案">
        <div class="dropzone-inner">
          <svg class="icon-film" width="42" height="42" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="2" y="4" width="20" height="16" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M2 8h4M2 16h4M18 8h4M18 16h4" stroke="currentColor" stroke-width="1.4"/>
            <circle cx="9.5" cy="12" r="2.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M13 13.5l2.2-2.2 2.8 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <p class="dropzone-title">拖放照片到這裡</p>
          <p class="dropzone-sub">或</p>
          <label class="btn btn-primary">
            選取檔案
            <input id="fileInput" type="file" accept="image/*" multiple hidden>
          </label>
        </div>
      </div>

      <div class="camera-panel">
        <div class="camera-view" id="cameraView">
          <video id="video" playsinline autoplay muted></video>
          <div class="camera-idle" id="cameraIdle">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 8.5C4 7.67 4.67 7 5.5 7H8l1.2-1.8c.2-.3.5-.5.85-.5h4.9c.35 0 .65.2.85.5L16 7h2.5c.83 0 1.5.67 1.5 1.5v9c0 .83-.67 1.5-1.5 1.5h-13C4.67 19 4 18.33 4 17.5v-9Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
              <circle cx="12" cy="13" r="3.2" stroke="currentColor" stroke-width="1.4"/>
            </svg>
            <p>鏡頭尚未開啟</p>
          </div>
          <span class="rec-dot" id="recDot" hidden></span>
        </div>
        <div class="camera-controls">
          <button id="startCam" class="btn btn-outline">開啟鏡頭</button>
          <button id="shotBtn" class="btn btn-shutter" disabled aria-label="拍照">
            <span class="shutter-ring"></span>
          </button>
          <button id="stopCam" class="btn btn-outline" disabled>關閉鏡頭</button>
        </div>
        <canvas id="canvas" hidden></canvas>
      </div>

    </div>
    <p class="intake-note">照片只會留在你目前的瀏覽器分頁裡,重新整理就會消失 — 這是純前端展示介面。</p>
  </section>

  <section class="darkroom" aria-label="照片沖洗結果">
    <div class="darkroom-heading">
      <h2>沖洗中的照片</h2>
      <span class="count-tag" id="countTag">0 張</span>
    </div>
    <div id="strip" class="strip">
      <p class="empty-state" id="emptyState">還沒有照片 — 上面上傳或拍一張,它會顯示在這裡。</p>
    </div>
  </section>

</main>

<footer class="site-footer">
  <p>Darkroom · 純前端展示介面,可延伸接上你自己的後端或雲端儲存。</p>
</footer>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="script.js"></script>
</body>
</html>
